#
parameters :
    assembly_input_ref :
        ui-name : |
            Assembly/assembly set to be annotated
        short-hint : |
            The contig collection(s) you want to extract from with microTrait
    desc :
        ui-name: |
            Description
        short-hint: |
            Describe Contents of Output GenomeSet
        placeholder: |
            Enter Description
            
description : |
    <p>microTrait is a computational pipeline that infers and distills ecologically relevant traits from microbial genome sequences.</p>

publications :
    -
        display-text: |
            microTrait source code
        link: https://github.com/ukaraoz/microtrait
    -
        display-text: |
            microTrait publication
        link: https://www.frontiersin.org/articles/10.3389/fbinf.2022.918853/full

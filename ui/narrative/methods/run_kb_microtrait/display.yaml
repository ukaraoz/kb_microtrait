name: Extract fitness traits from microbial assemblies

tooltip: |
    Extract fitness traits from your assemblies, isolate genomes, or MAGs with microtrait. <u>For KBase assembly objects.</u>

screenshots: []

icon: microTrait_AppIcon.png

#
# define a set of similar apps that might be useful to the user
#
suggestions:
    apps:
        related:
            []
        next:
